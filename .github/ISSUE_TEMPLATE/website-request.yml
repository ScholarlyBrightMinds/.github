name: "🌐 Request Your Website"
description: "Fill this in and we'll build your academic website for free."
title: "Website Request — [Your Name]"
labels: ["website-request"]
body:
  - type: markdown
    attributes:
      value: |
        **Privacy notice:** By submitting this request, you consent to us using the information you provide (name, email, academic profile links, photo) only to build and maintain your personal website. Your info won't be shared with third parties. You can ask us to delete your data or take down the site at any time by emailing abdallah.abouhajal@gmail.com.

  - type: markdown
    attributes:
      value: |
        Thanks for your interest! This should take about 2 minutes.

        Give us your Google Scholar link, a photo, and a colour preference. We'll handle the rest of the build — your publications and citations are pulled automatically from Scholar once the site is live. If anything's missing or unclear, we'll reach out.

  - type: input
    id: scholar
    attributes:
      label: "Google Scholar Profile URL"
      placeholder: "https://scholar.google.com/citations?user=..."
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: "Email (so we can reach you if needed)"
      placeholder: "your.email@example.com"
    validations:
      required: true

  - type: input
    id: color
    attributes:
      label: "Color / Theme preference"
      placeholder: "e.g. dark blue, emerald green, university colors, or 'surprise me'"
    validations:
      required: true

  - type: dropdown
    id: blog
    attributes:
      label: "Want a Blog section?"
      options:
        - "Yes, I'll start writing soon"
        - "Not now, but maybe later"
        - "No thanks"
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: "Anything else we should know?"
      placeholder: "Bio you'd like to use, specific research you want highlighted, Scopus/ORCID links if you have them handy... totally optional, we can find most of this ourselves."

  - type: markdown
    attributes:
      value: |
        **📸 Don't forget your profile photo!** Drag and drop it into this issue after submitting (1080×1080ish, JPG or PNG).
        
        Or email it to **abdallah.abouhajal@gmail.com** — whatever's easier.
